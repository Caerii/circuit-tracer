name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  # Override the local pytorch index source — CI uses CPU-only wheels from PyPI
  UV_INDEX: ""

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --group dev --no-sources
      - name: Check formatting
        run: uv run ruff format --check
      - name: Check linting
        run: uv run ruff check
      - name: Check types
        run: uv run pyright

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --group dev --no-sources
      - name: Run tests
        run: uv run pytest tests -m "not requires_disk and not requires_gpu" -q
